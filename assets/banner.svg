<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Decorative blurred orbs -->
  <circle cx="200" cy="150" r="120" fill="#667eea" opacity="0.08" filter="url(#blur1)"/>
  <circle cx="1000" cy="100" r="100" fill="#764ba2" opacity="0.1" filter="url(#blur1)"/>
  <circle cx="600" cy="250" r="80" fill="#667eea" opacity="0.06" filter="url(#blur2)"/>

  <!-- Grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="150" y1="0" x2="150" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="450" y1="0" x2="450" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="750" y1="0" x2="750" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
    <line x1="1050" y1="0" x2="1050" y2="300"/>
  </g>

  <!-- Multi-agent network nodes left -->
  <g transform="translate(80, 70)" opacity="0.12" stroke="#667eea" stroke-width="1.5" fill="none">
    <circle cx="20" cy="20" r="6" fill="#667eea" opacity="0.4"/>
    <circle cx="80" cy="10" r="5" fill="#667eea" opacity="0.3"/>
    <circle cx="50" cy="60" r="7" fill="#667eea" opacity="0.4"/>
    <circle cx="110" cy="50" r="4" fill="#667eea" opacity="0.3"/>
    <circle cx="30" cy="100" r="5.5" fill="#667eea" opacity="0.35"/>
    <circle cx="90" cy="90" r="4.5" fill="#667eea" opacity="0.3"/>
    <line x1="20" y1="20" x2="80" y2="10"/>
    <line x1="20" y1="20" x2="50" y2="60"/>
    <line x1="80" y1="10" x2="110" y2="50"/>
    <line x1="50" y1="60" x2="110" y2="50"/>
    <line x1="50" y1="60" x2="30" y2="100"/>
    <line x1="30" y1="100" x2="90" y2="90"/>
    <line x1="110" y1="50" x2="90" y2="90"/>
    <line x1="80" y1="10" x2="50" y2="60"/>
  </g>

  <!-- Embodied AI network right -->
  <g transform="translate(1000, 70)" opacity="0.1" stroke="#764ba2" stroke-width="1.5" fill="none">
    <circle cx="0" cy="0" r="5" fill="#764ba2" opacity="0.4"/>
    <circle cx="60" cy="30" r="4" fill="#764ba2" opacity="0.3"/>
    <circle cx="30" cy="70" r="6" fill="#764ba2" opacity="0.4"/>
    <circle cx="90" cy="80" r="3.5" fill="#764ba2" opacity="0.3"/>
    <circle cx="70" cy="120" r="4.5" fill="#764ba2" opacity="0.35"/>
    <line x1="0" y1="0" x2="60" y2="30"/>
    <line x1="60" y1="30" x2="30" y2="70"/>
    <line x1="30" y1="70" x2="90" y2="80"/>
    <line x1="0" y1="0" x2="30" y2="70"/>
    <line x1="90" y1="80" x2="70" y2="120"/>
    <line x1="30" y1="70" x2="70" y2="120"/>
  </g>

  <!-- Accent line -->
  <rect x="100" y="115" width="60" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Top label -->
  <text x="600" y="80" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="500" letter-spacing="6" fill="#667eea" opacity="0.9">NEURIPS 2026 WORKSHOP</text>

  <!-- Main title -->
  <text x="600" y="135" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="#ffffff">UniMAS</text>

  <!-- Subtitle -->
  <text x="600" y="170" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="400" fill="#a0a0b8" letter-spacing="0.5">A Unified View of Multi-Agent Systems for Embodied AI</text>

  <!-- Info pills -->
  <g transform="translate(600, 215)">
    <rect x="-230" y="-14" width="200" height="28" rx="14" fill="#667eea" opacity="0.12"/>
    <text x="-130" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#8899ee">December 12 or 13, 2026  |  Atlanta</text>

    <rect x="30" y="-14" width="200" height="28" rx="14" fill="#764ba2" opacity="0.12"/>
    <text x="130" y="5" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="500" fill="#a07cc5">NeurIPS 2026</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="296" width="1200" height="4" fill="url(#accent)" opacity="0.6"/>
</svg>
